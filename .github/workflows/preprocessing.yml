name: Preprocessing Otomatis SML

on:
  push:
    branches:
      - main  	     # Alur ini akan berjalan otomatis setiap kamu melakukan git push ke branch main
  workflow_dispatch: # Memunculkan tombol manual di web GitHub jika ingin dijalankan sewaktu-waktu

jobs:
  run-preprocessing-job:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil semua file dari repositori kamu ke server GitHub Actions
    - name: Ambil Source Code
      uses: actions/checkout@v3

    # 2. Menyiapkan lingkungan Python di server GitHub
    - name: Setup Python v3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Menginstall library Python yang dibutuhkan oleh file automate.py
    - name: Install Library Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    # 4. Menjalankan script otomasi
    - name: Eksekusi Script Preprocessing
      run: |
        python preprocessing/automate_amar_luthfi.py

    # 5. Script menghasilkan file CSV baru di folder dataset_preprocessing, 
    #    GitHub Actions akan otomatis menyimpan (commit & push) kembali ke repositori.
    - name: Simpan Otomatis Hasil Preprocessing ke Repositori
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add preprocessing/dataset_preprocessing/
        git commit -m "Automated update: Hasil preprocessing baru" || echo "Tidak ada perubahan data untuk di-commit."
        git push origin main || echo "Tidak ada perubahan yang perlu di-push."